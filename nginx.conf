proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=flipt_cache:10m max_size=100m inactive=60m;

upstream flipt {
    server flipt-1:8080;
    server flipt-2:8080;
    server flipt-3:8080;
}

# HTTPS for the SDK client — with proxy caching to reproduce stale snapshot issue
server {
    listen 443 ssl;

    ssl_certificate /certs/server.pem;
    ssl_certificate_key /certs/server.key;

    location / {
        proxy_pass http://flipt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Proxy cache is configured but bypassed via no-store
        proxy_cache flipt_cache;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        proxy_cache_key "$request_uri";
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "no-store" always;
    }
}

# HTTP for API toggle from host — no caching
server {
    listen 8080;

    location / {
        proxy_pass http://flipt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
