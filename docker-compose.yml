services:
  generate-keys:
    image: alpine:3.21
    command: sh -c "apk add --no-cache openssl && sh /scripts/generate-keys.sh"
    volumes:
      - ./scripts:/scripts:ro
      - ./keys:/keys

  flipt:
    image: flipt/flipt:v1.55.1
    command: ["./flipt"]
    volumes:
      - ./flipt/config.yml:/etc/flipt/config/default.yml:ro
      - ./keys:/etc/flipt/keys:ro
    depends_on:
      generate-keys:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  seed-flags:
    image: curlimages/curl:latest
    depends_on:
      flipt:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/seed-flags.sh"]
    environment:
      FLIPT_URL: http://flipt:8080
      FLIPT_AUTH_TOKEN: test-token-123

  identity-server:
    build:
      context: .
      dockerfile: identity-server/Dockerfile
    volumes:
      - ./keys:/keys:ro
    depends_on:
      generate-keys:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      FLIPT_URL: http://flipt:8080
      IDENTITY_SERVER_URL: http://identity-server:9090
      UPDATE_INTERVAL_SECONDS: 10
    depends_on:
      seed-flags:
        condition: service_completed_successfully
      identity-server:
        condition: service_healthy
      flipt:
        condition: service_healthy
