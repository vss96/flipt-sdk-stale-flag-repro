services:
  generate-tls-certs:
    image: alpine:3.21
    command: sh -c "apk add --no-cache openssl && sh /scripts/generate-tls-certs.sh"
    volumes:
      - ./scripts:/scripts:ro
      - certs:/certs

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  seed-flags:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./flipt/features:/seed:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set m http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing m/flipt &&
        mc cp /seed/flags.features.yml m/flipt/flags.features.yml &&
        mc cp /seed/other.features.yml m/flipt/other.features.yml

  flipt-1:
    image: flipt/flipt:v1.55.1
    command: ["./flipt"]
    volumes:
      - ./flipt/config.yml:/etc/flipt/config/default.yml:ro
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      seed-flags:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  flipt-2:
    image: flipt/flipt:v1.55.1
    command: ["./flipt"]
    volumes:
      - ./flipt/config.yml:/etc/flipt/config/default.yml:ro
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      seed-flags:
        condition: service_completed_successfully
      flipt-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  flipt-3:
    image: flipt/flipt:v1.55.1
    command: ["./flipt"]
    volumes:
      - ./flipt/config.yml:/etc/flipt/config/default.yml:ro
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      seed-flags:
        condition: service_completed_successfully
      flipt-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  lb:
    image: nginx:alpine
    ports:
      - "8443:443"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/certs:ro
    depends_on:
      generate-tls-certs:
        condition: service_completed_successfully
      flipt-1:
        condition: service_healthy
      flipt-2:
        condition: service_healthy
      flipt-3:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      FLIPT_URL: https://lb:443
      UPDATE_INTERVAL_SECONDS: 30
    volumes:
      - certs:/certs:ro
    depends_on:
      lb:
        condition: service_started
      flipt-1:
        condition: service_healthy
      flipt-2:
        condition: service_healthy
      flipt-3:
        condition: service_healthy

  mc:
    image: minio/mc
    profiles: ["tools"]

volumes:
  certs:
