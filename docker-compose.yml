services:
  generate-tls-certs:
    image: alpine:3.21
    command: sh -c "apk add --no-cache openssl && sh /scripts/generate-tls-certs.sh"
    volumes:
      - ./scripts:/scripts:ro
      - certs:/certs

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flipt
      POSTGRES_PASSWORD: flipt
      POSTGRES_DB: flipt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flipt"]
      interval: 3s
      timeout: 3s
      retries: 10

  flipt-1:
    image: flipt/flipt:v1.55.1
    command: sh -c "./flipt --force-migrate & sleep 3 && ./flipt import /etc/flipt/seed/features.yml && wait"
    volumes:
      - ./flipt/config.yml:/etc/flipt/config/default.yml:ro
      - ./flipt/features.yml:/etc/flipt/seed/features.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  flipt-2:
    image: flipt/flipt:v1.55.1
    command: ["./flipt"]
    volumes:
      - ./flipt/config.yml:/etc/flipt/config/default.yml:ro
    depends_on:
      flipt-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  flipt-3:
    image: flipt/flipt:v1.55.1
    command: ["./flipt"]
    volumes:
      - ./flipt/config.yml:/etc/flipt/config/default.yml:ro
    depends_on:
      flipt-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  lb:
    image: nginx:alpine
    ports:
      - "8443:443"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/certs:ro
    depends_on:
      generate-tls-certs:
        condition: service_completed_successfully
      flipt-1:
        condition: service_healthy
      flipt-2:
        condition: service_healthy
      flipt-3:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      FLIPT_URL: https://lb:443
      UPDATE_INTERVAL_SECONDS: 30
    volumes:
      - certs:/certs:ro
    depends_on:
      lb:
        condition: service_started
      flipt-1:
        condition: service_healthy
      flipt-2:
        condition: service_healthy
      flipt-3:
        condition: service_healthy

volumes:
  certs:
